<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <title>Pokémon Trinkspiel</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <meta name="theme-color" content="#000000">

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="page">

    <!-- Spieler-Setup Modal -->
    <div id="player-setup-modal" class="modal">
      <div class="modal-content setup-modal">

        <h1 class="modal-title">Pokémon Trinkspiel</h1>
        <p class="modal-subtitle">von Dennis</p>

        <h2 class="modal-section-title">Spieler auswählen</h2>

        <label class="modal-label">Anzahl Spieler</label>
        <input id="setup-player-count" type="number" class="modal-select" value="2" min="1" max="99">


        <div id="setup-player-names" class="modal-names"></div>

        <button id="setup-start-btn" class="modal-button">
          Spiel starten
        </button>

      </div>
    </div>

    <!-- Board -->
    <div class="board-container">
      <div class="board-viewport">
        <div class="board-wrapper">
          <img id="board-image" src="/assets/Pokemon-Trinkspiel.png" class="board" alt="Pokémon Trinkspiel Brett">
        </div>
      </div>
    </div>

    <div id="leaderboard">
      <div id="leaderboard-toggle">⮞</div>
      <div id="leaderboard-content"></div>
    </div>


<!-- Bottom Controls -->
<div id="game-controls" class="controls hidden">
  <div class="left-controls">
    <span id="current-player-label"></span>
    <button id="manual-next-btn">Nächster Spieler</button>
    <button id="zoom-reset-btn">Ansicht</button>
  </div>

  <div class="right-controls">
    <div id="roll-result" class="roll-result"></div>
    <input id="manual-roll" type="number" placeholder="Zahl" style="width:40px;">
    <button id="manual-roll-btn">Setzen</button>
    <button id="roll-btn">Würfeln</button>
  </div>
</div>

</div> <!-- dein closing div .page -->

<!-- NEU: Würfel unten rechts -->
<div id="dice-container">
  <div id="dice" class="dice">

    <div class="face face-1 pip-face">
      <span class="pip pip-center"></span>
    </div>

    <div class="face face-2 pip-face">
      <span class="pip pip-top-left"></span>
      <span class="pip pip-bottom-right"></span>
    </div>

    <div class="face face-3 pip-face">
      <span class="pip pip-top-left"></span>
      <span class="pip pip-center"></span>
      <span class="pip pip-bottom-right"></span>
    </div>

    <div class="face face-4 pip-face">
      <span class="pip pip-top-left"></span>
      <span class="pip pip-top-right"></span>
      <span class="pip pip-bottom-left"></span>
      <span class="pip pip-bottom-right"></span>
    </div>

    <div class="face face-5 pip-face">
      <span class="pip pip-top-left"></span>
      <span class="pip pip-top-right"></span>
      <span class="pip pip-center"></span>
      <span class="pip pip-bottom-left"></span>
      <span class="pip pip-bottom-right"></span>
    </div>

    <div class="face face-6 pip-face">
      <span class="pip pip-top-left"></span>
      <span class="pip pip-top-right"></span>
      <span class="pip pip-mid-left"></span>
      <span class="pip pip-mid-right"></span>
      <span class="pip pip-bottom-left"></span>
      <span class="pip pip-bottom-right"></span>
    </div>

    <div class="face face-number"></div>

  </div>
</div>

<!-- Pop-Up -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h3 id="popup-title"></h3>
    <p id="popup-text"></p>
    <div id="popup-extra"></div>
    <!-- Dein alter Button bleibt -->
    <div id="popup-dice-container" class="hidden"></div>
    <button id="popup-dice" class="hidden">Würfeln!</button>
    <button id="popup-close">OK</button>

  </div>
</div>

<!-- Pokémon Auswahl Modal -->
<div id="pokemon-select-modal" class="modal hidden">
  <div class="modal-content">

    <div id="pokemon-player-title" class="pokemon-player-title"></div>

    <h2>Wähle dein Start-Pokémon</h2>

    <div class="pokemon-options">
      <div class="poke-option" data-color="red">
        <img src="/assets/charmander.png" alt="Charmander">
      </div>

      <div class="poke-option" data-color="blue">
        <img src="/assets/squirtle.png" alt="Squirtle">
      </div>

      <div class="poke-option" data-color="green">
        <img src="/assets/bulbasaur.png" alt="Bulbasaur">
      </div>
    </div>

  </div>
</div>
<script type="module" src="main.js"></script>
</body>
</html>
